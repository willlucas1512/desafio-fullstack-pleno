services:
  - type: web
    name: painel-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3001'
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: SEED_FILE
        value: /app/data/seed.json
      # Credenciais do técnico — devem ser configuradas no painel do Render
      # antes do primeiro deploy (sync:false bloqueia o deploy até serem
      # preenchidas). Os valores estão no enunciado público do desafio.
      - key: TECHNICIAN_EMAIL
        sync: false
      - key: TECHNICIAN_PASSWORD
        sync: false
      # URL pública do frontend (Vercel) — definir após o deploy do front.
      - key: CORS_ORIGIN
        sync: false
