services:
  api:
    container_name: painel-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # config do runtime (JWT_SECRET, CORS_ORIGIN, credenciais do tecnico)
    # vive em apps/api/.env (copiado de apps/api/.env.example). Veja o README.
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: production
      SEED_FILE: /app/data/seed.json
    ports:
      - '${API_HOST_PORT:-3001}:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    container_name: painel-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # URL que o browser usa pra chamar a API (porta exposta no host,
        # nao o nome de servico do compose). Em prod, sobrescreva no .env.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - '${WEB_HOST_PORT:-3000}:3000'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped
